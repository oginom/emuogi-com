<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8f8f6" />
    <meta name="description" content="Home page of emuogi" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
    <title>emuogi.com</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #f8f8f6;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        gap: 2rem;
      }

      .icon {
        width: 96px;
        height: 96px;
        border-radius: 50%;
      }

      .name {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        text-align: center;
      }

      .name-ja {
        font-size: 1.5rem;
        font-weight: 400;
        letter-spacing: 0.08em;
      }

      .name-en {
        font-size: 0.9rem;
        font-weight: 300;
        letter-spacing: 0.15em;
        color: #888;
        text-transform: uppercase;
      }

      .divider {
        width: 32px;
        height: 1px;
        background-color: #ccc;
      }

      .links {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.875rem;
        font-weight: 300;
      }

      .link-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      .link-label {
        color: #aaa;
        letter-spacing: 0.05em;
        min-width: 3.5rem;
        text-align: right;
      }

      .links a {
        color: #1a1a1a;
        text-decoration: none;
        border-bottom: 1px solid #ccc;
        padding-bottom: 1px;
        transition: border-color 0.2s;
      }

      .links a:hover {
        border-color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="icon_tr.png" class="icon" alt="icon" />
      <div class="name">
        <span class="name-ja">荻野 将拓</span>
        <span class="name-en">Masahiro Ogino</span>
      </div>
      <div class="divider"></div>
      <div class="links">
        <div class="link-row">
          <span class="link-label">email</span>
          <a href="mailto:oginomaa@gmail.com">oginomaa@gmail.com</a>
        </div>
        <div class="link-row">
          <span class="link-label">X</span>
          <a href="https://x.com/emuogi" target="_blank" rel="noopener noreferrer">@emuogi</a>
        </div>
        <div class="link-row">
          <span class="link-label">GitHub</span>
          <a href="https://github.com/oginom" target="_blank" rel="noopener noreferrer">oginom</a>
        </div>
      </div>
    </main>
  </body>
</html>
